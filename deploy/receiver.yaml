apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-bot-receiver
  namespace: deploy-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deploy-bot-receiver
  template:
    metadata:
      labels:
        app: deploy-bot-receiver
    spec:
      serviceAccountName: deploy-bot-receiver
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: receiver
          image: ghcr.io/ezubriski/deploy-bot:latest
          command: ["/receiver"]
          env:
            - name: CONFIG_PATH
              value: /etc/deploy-bot/config.json
            - name: AWS_SECRET_NAME
              value: deploy-bot/secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/deploy-bot/config.json
              subPath: config.json
              readOnly: true
            - name: discovered
              mountPath: /etc/deploy-bot/discovered.json
              subPath: discovered.json
              readOnly: true
          ports:
            - name: health
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: deploy-bot-config
        - name: discovered
          configMap:
            name: deploy-bot-discovered
            optional: true
