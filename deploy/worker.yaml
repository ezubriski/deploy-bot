apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-bot-worker
  namespace: deploy-bot
spec:
  replicas: 0
  selector:
    matchLabels:
      app: deploy-bot-worker
  template:
    metadata:
      labels:
        app: deploy-bot-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: deploy-bot-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/ezubriski/deploy-bot:latest
          command: ["/bot"]
          env:
            - name: CONFIG_PATH
              value: /etc/deploy-bot/config/config.json
            - name: AWS_SECRET_NAME
              value: deploy-bot/secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/deploy-bot/config
              readOnly: true
            - name: discovered
              mountPath: /etc/deploy-bot/discovered
              readOnly: true
          ports:
            - name: metrics
              containerPort: 9090
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: deploy-bot-config
        - name: discovered
          configMap:
            name: deploy-bot-discovered
            optional: true
