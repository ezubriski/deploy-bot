apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-bot-receiver
  namespace: deploy-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deploy-bot-receiver
  template:
    metadata:
      labels:
        app: deploy-bot-receiver
    spec:
      serviceAccountName: deploy-bot
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: receiver
          image: 123456789012.dkr.ecr.us-west-2.amazonaws.com/deploy-bot:latest
          command: ["/receiver"]
          env:
            - name: CONFIG_PATH
              value: /etc/deploy-bot/config.json
            - name: AWS_SECRET_NAME
              value: deploy-bot/secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/deploy-bot
              readOnly: true
          ports:
            - name: health
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: deploy-bot-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-bot-worker
  namespace: deploy-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deploy-bot-worker
  template:
    metadata:
      labels:
        app: deploy-bot-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: deploy-bot
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: 123456789012.dkr.ecr.us-west-2.amazonaws.com/deploy-bot:latest
          command: ["/bot"]
          env:
            - name: CONFIG_PATH
              value: /etc/deploy-bot/config.json
            - name: AWS_SECRET_NAME
              value: deploy-bot/secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/deploy-bot
              readOnly: true
          ports:
            - name: metrics
              containerPort: 9090
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: deploy-bot-config
