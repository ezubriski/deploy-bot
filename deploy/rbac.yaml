apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploy-bot
  namespace: deploy-bot
  annotations:
    # Replace with your IAM role ARN. See terraform/README.md for setup.
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/deploy-bot
---
# Allows the receiver to write discovered app configs to its own ConfigMap.
# The ConfigMap is not version-controlled -- it is managed by the repo scanner.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deploy-bot-discovered
  namespace: deploy-bot
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["deploy-bot-discovered"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deploy-bot-discovered
  namespace: deploy-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deploy-bot-discovered
subjects:
  - kind: ServiceAccount
    name: deploy-bot
    namespace: deploy-bot
