name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  actions: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  tag:
    runs-on: self-hosted
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "${LATEST}" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "${LATEST}" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "${LATEST}" | sed 's/^v//' | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST} -> ${VERSION} (${{ inputs.bump }})"

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag ${VERSION}
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git push origin ${VERSION}

  wait-ci:
    runs-on: self-hosted
    needs: [tag]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait for CI build on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FULL_SHA=$(git rev-parse HEAD)
          echo "Waiting for CI workflow on ${FULL_SHA}..."
          DEADLINE=$(( $(date +%s) + 1800 ))
          while :; do
            STATUS=$(gh run list \
              --workflow=build.yml \
              --commit="${FULL_SHA}" \
              --json status,conclusion \
              --jq '.[0] | "\(.status) \(.conclusion)"' || echo "missing missing")
            echo "  status: ${STATUS}"
            case "${STATUS}" in
              "completed success") echo "CI succeeded"; exit 0 ;;
              "completed "*)        echo "CI did not succeed: ${STATUS}"; exit 1 ;;
            esac
            if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
              echo "Timed out waiting for CI on ${FULL_SHA}"; exit 1
            fi
            sleep 15
          done

  release:
    runs-on: self-hosted
    needs: [tag, wait-ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.version }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push:
    runs-on: self-hosted
    needs: [tag, wait-ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Pull, retag, push to ghcr.io
        run: |
          VERSION=${{ needs.tag.outputs.version }}
          SHA=${{ steps.sha.outputs.sha }}
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman pull ${{ env.GHCR_IMAGE }}:${SHA}
          podman tag ${{ env.GHCR_IMAGE }}:${SHA} ${{ env.GHCR_IMAGE }}:${VERSION}
          podman tag ${{ env.GHCR_IMAGE }}:${SHA} ${{ env.GHCR_IMAGE }}:latest
          podman push ${{ env.GHCR_IMAGE }}:${VERSION}
          podman push ${{ env.GHCR_IMAGE }}:latest

      - name: Pull, retag, push to ECR
        if: env.ECR_REGISTRY != ''
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          VERSION=${{ needs.tag.outputs.version }}
          SHA=${{ steps.sha.outputs.sha }}
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            podman login --username AWS --password-stdin ${ECR_REGISTRY}
          podman pull ${ECR_REGISTRY}/deploy-bot:${SHA}
          podman tag ${ECR_REGISTRY}/deploy-bot:${SHA} ${ECR_REGISTRY}/deploy-bot:${VERSION}
          podman tag ${ECR_REGISTRY}/deploy-bot:${SHA} ${ECR_REGISTRY}/deploy-bot:latest
          podman push ${ECR_REGISTRY}/deploy-bot:${VERSION}
          podman push ${ECR_REGISTRY}/deploy-bot:latest
