name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-west-2
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

  build:
    runs-on: self-hosted
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          podman build -t ${{ env.GHCR_IMAGE }}:${TAG} -t ${{ env.GHCR_IMAGE }}:latest .

  push:
    runs-on: self-hosted
    needs: [lint, test, build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to ghcr.io
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push ${{ env.GHCR_IMAGE }}:${TAG}
          podman push ${{ env.GHCR_IMAGE }}:latest

      - name: Configure AWS credentials
        if: env.ECR_REGISTRY != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push to ECR
        if: env.ECR_REGISTRY != ''
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          make ecr-login REGISTRY=${ECR_REGISTRY}
          podman tag ${{ env.GHCR_IMAGE }}:${TAG} ${ECR_REGISTRY}/deploy-bot:${TAG}
          podman tag ${{ env.GHCR_IMAGE }}:${TAG} ${ECR_REGISTRY}/deploy-bot:latest
          podman push ${ECR_REGISTRY}/deploy-bot:${TAG}
          podman push ${ECR_REGISTRY}/deploy-bot:latest
