name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-west-2
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: golangci-lint run

  test:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

  build-and-push:
    runs-on: self-hosted
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: podman build -t ${{ env.GHCR_IMAGE }}:${{ steps.sha.outputs.sha }} .

      - name: Push SHA tag to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push ${{ env.GHCR_IMAGE }}:${{ steps.sha.outputs.sha }}

      - name: Push SHA tag to ECR
        if: env.ECR_REGISTRY != ''
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          SHA=${{ steps.sha.outputs.sha }}
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            podman login --username AWS --password-stdin ${ECR_REGISTRY}
          podman tag ${{ env.GHCR_IMAGE }}:${SHA} ${ECR_REGISTRY}/deploy-bot:${SHA}
          podman push ${ECR_REGISTRY}/deploy-bot:${SHA}

  promote:
    runs-on: self-hosted
    needs: [lint, test, build-and-push]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Promote to latest on ghcr.io
        run: |
          SHA=${{ steps.sha.outputs.sha }}
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman pull ${{ env.GHCR_IMAGE }}:${SHA}
          podman tag ${{ env.GHCR_IMAGE }}:${SHA} ${{ env.GHCR_IMAGE }}:latest
          podman push ${{ env.GHCR_IMAGE }}:latest

      - name: Promote to latest on ECR
        if: env.ECR_REGISTRY != ''
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          SHA=${{ steps.sha.outputs.sha }}
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            podman login --username AWS --password-stdin ${ECR_REGISTRY}
          podman pull ${ECR_REGISTRY}/deploy-bot:${SHA}
          podman tag ${ECR_REGISTRY}/deploy-bot:${SHA} ${ECR_REGISTRY}/deploy-bot:latest
          podman push ${ECR_REGISTRY}/deploy-bot:latest
