name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "alias=" >> "$GITHUB_OUTPUT"
            echo "set_default=false" >> "$GITHUB_OUTPUT"
          else
            # workflow_run from Release — find the latest tag
            VERSION=$(git describe --tags --abbrev=0)
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "alias=latest" >> "$GITHUB_OUTPUT"
            echo "set_default=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy docs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALIAS="${{ steps.version.outputs.alias }}"
          SET_DEFAULT="${{ steps.version.outputs.set_default }}"

          if [ -n "$ALIAS" ]; then
            mike deploy --push --update-aliases "$VERSION" "$ALIAS"
          else
            mike deploy --push "$VERSION"
          fi

          if [ "$SET_DEFAULT" = "true" ]; then
            mike set-default --push latest
          else
            # Set dev as default until the first release creates a "latest" alias
            mike set-default --push dev 2>/dev/null || true
          fi
