name: PR

on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - "**/*.go"
              - "go.mod"
              - "go.sum"
              - "Makefile"
              - "Dockerfile"
              - ".golangci.yml"
              - ".github/workflows/pr.yml"
            docs:
              - "docs/**/*.md"
              - "mkdocs.yml"
              - "requirements-docs.txt"

  fmt:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make fmt-check

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - run: make lint

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'self-hosted' || 'ubuntu-latest' }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: deploy_bot_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d deploy_bot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # When set, internal/storetest skips testcontainer startup and
      # connects to this DSN directly — faster and avoids Docker-in-
      # Docker. The service container above provisions the database;
      # storetest applies goose migrations on first connect.
      DEPLOYBOT_TEST_POSTGRES_DSN: "postgres://test:test@localhost:5432/deploy_bot_test?sslmode=disable"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: make build

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements-docs.txt
      # No --strict: mkdocs emits warnings for relative links from doc
      # files to source files outside the docs tree (e.g.
      # argocd-notifications.md → ../deploy/argocd-notifications/templates.yaml,
      # argocd-notifications.md → ../internal/argocd/payload.go). Those
      # links are intentional — they point to where the code lives in
      # the repo for operators reading the doc on GitHub — and they're
      # not fixable without rewriting to absolute github.com URLs that
      # would break on forks. Warnings are still visible in the job
      # log; they just don't block the PR.
      - run: mkdocs build
